velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.15, 0.0, 0.8]
    min_velocity: [-0.05, 0.0, -0.8]
    max_accel: [0.25, 0.0, 1.2]
    max_decel: [-0.35, 0.0, -1.5]
    odom_topic: /bumperbot_controller/odom
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

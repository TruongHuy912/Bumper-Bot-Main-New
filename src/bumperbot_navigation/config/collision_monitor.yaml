collision_monitor:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    cmd_vel_in_topic: /cmd_vel_smoothed
    cmd_vel_out_topic: /cmd_vel
    transform_tolerance: 0.3
    source_timeout: 1.0
    stop_pub_timeout: 2.0

    polygons: ["StopZone", "SlowZone"]

    StopZone:
      type: "circle"
      radius: 0.20
      action_type: "stop"
      min_points: 4
      visualize: true

    SlowZone:
      type: "circle"
      radius: 0.35
      action_type: "slowdown"
      slowdown_ratio: 0.45
      min_points: 4
      visualize: true

    observation_sources: ["scan"]

    scan:
      type: "scan"
      topic: /scan
